name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post review started comment
        id: comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comment } = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⏳ **Claude Code Review** en cours...\n\nLa review sera mise à jour ici une fois terminée.'
            });
            core.setOutput('comment-id', comment.id);

      - name: Claude Code Review
        id: review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--allowedTools Bash,Read,Glob,Grep,Write,Edit"
          prompt: |
            Review this pull request thoroughly. Focus on:
            - Security vulnerabilities
            - Logic errors and bugs
            - Breaking changes
            - Missing error handling in critical paths

            For each issue found, classify it as:
            - 🚫 BLOCKING: Must be fixed before merge (security, bugs, data corruption)
            - ⚠️ WARNING: Should be fixed but not a blocker

            If you find ANY blocking issue, you MUST end your review by posting a review with request_changes.
            If there are no blocking issues, approve the PR.

            Do NOT flag: formatting, naming preferences, missing comments, or minor style issues.

            At the end, output a summary in this format:
            ## Résultat de la review
            - **Blocking issues**: <count>
            - **Warnings**: <count>
            ### Détails
            <list of issues>

      - name: Update comment with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentId = '${{ steps.comment.outputs.comment-id }}';
            const conclusion = '${{ steps.review.outcome }}';
            const success = conclusion === 'success';
            const execFile = '${{ steps.review.outputs.execution_file }}';

            let claudeOutput = '';
            if (execFile && fs.existsSync(execFile)) {
              try {
                const raw = fs.readFileSync(execFile, 'utf8');
                const events = JSON.parse(raw);
                const textMessages = events
                  .filter(e => e.type === 'assistant' && e.message?.content)
                  .flatMap(e => e.message.content)
                  .filter(c => c.type === 'text')
                  .map(c => c.text);
                claudeOutput = textMessages.join('\n\n') || 'Aucun texte de review produit.';
              } catch {
                claudeOutput = fs.readFileSync(execFile, 'utf8').slice(0, 60000);
              }
            }

            if (!claudeOutput) {
              claudeOutput = 'Le step Claude Code Review a échoué avant de produire une sortie. Vérifiez les logs de l\'action.';
            }

            const icon = success ? '✅' : '❌';
            const status = success
              ? 'Aucun problème bloquant détecté.'
              : '**Des problèmes bloquants ont été détectés.** La PR ne peut pas être mergée tant que ces problèmes ne sont pas résolus.';

            const body = `${icon} **Claude Code Review** terminée.\n\n${status}\n\n<details>\n<summary>Détails de la review</summary>\n\n${claudeOutput}\n\n</details>`;

            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: parseInt(commentId),
              body: body
            });
